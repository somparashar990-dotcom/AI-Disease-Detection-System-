<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings — Medora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0a; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --muted:rgba(255,255,255,0.4); }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:#e8eaf0; min-height:100vh; padding:0 0 80px; }
    body::before {
      content:''; position:fixed; top:-100px; right:-100px;
      width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle,#3b82f6,#1d4ed8);
      filter:blur(100px); opacity:0.12; pointer-events:none;
    }

    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 40px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,0.02);
      backdrop-filter:blur(12px);
      position:sticky; top:0; z-index:100;
    }
    .topbar-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-icon {
      width:32px; height:32px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
    }
    .logo-icon svg { width:16px; height:16px; }
    .logo-text { font-size:1.1rem; font-weight:700; color:#fff; }
    .topbar-links { display:flex; gap:20px; align-items:center; }
    .topbar-links a { color:var(--muted); text-decoration:none; font-size:0.875rem; font-weight:500; transition:color 0.2s; }
    .topbar-links a:hover { color:#fff; }

    .hero {
      text-align:center; padding:64px 20px 40px;
    }
    .hero h1 { font-size:2.2rem; font-weight:700; letter-spacing:-1px; color:#fff; margin-bottom:10px; }
    .hero p { color:var(--muted); font-size:1rem; }

    /* Search bar */
    .search-wrap {
      max-width:480px; margin:0 auto 48px;
      display:flex; gap:12px; padding:0 20px;
    }
    .search-input {
      flex:1;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 18px;
      color:#fff; font-size:0.95rem; font-family:inherit;
      outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color:rgba(99,102,241,0.6);
      box-shadow:0 0 0 3px rgba(99,102,241,0.15);
    }
    .search-input::placeholder { color:rgba(255,255,255,0.25); }
    .btn-search {
      padding:14px 24px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      border:none; border-radius:14px;
      color:#fff; font-size:0.9rem; font-weight:600;
      cursor:pointer; font-family:inherit;
      transition:opacity 0.2s, transform 0.15s;
      white-space:nowrap;
    }
    .btn-search:hover { opacity:0.9; transform:translateY(-1px); }

    /* Content area */
    .content { max-width:800px; margin:0 auto; padding:0 20px; }

    .section-title {
      font-size:1rem; font-weight:600; color:rgba(255,255,255,0.6);
      margin-bottom:16px; display:flex; align-items:center; gap:8px;
    }
    .count-badge {
      background:rgba(99,102,241,0.2); color:#818cf8;
      font-size:0.75rem; padding:2px 10px; border-radius:20px;
    }

    .booking-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      padding:24px;
      margin-bottom:16px;
      position:relative;
      transition:border-color 0.2s, transform 0.2s;
      animation:fadeIn 0.35s ease forwards;
    }
    .booking-card:hover { border-color:rgba(99,102,241,0.3); transform:translateY(-2px); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .doctor-info h3 { font-size:1.05rem; font-weight:700; color:#fff; margin-bottom:3px; }
    .doctor-info p { font-size:0.82rem; color:var(--muted); }

    .badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; }
    .badge-confirmed { background:rgba(99,102,241,0.15); color:#818cf8; border:1px solid rgba(99,102,241,0.2); }
    .badge-completed { background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
    .badge-cancelled { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }

    .card-body { display:grid; grid-template-columns:1fr 1fr; gap:10px 24px; }
    .info-item { display:flex; flex-direction:column; gap:2px; }
    .info-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
    .info-val { font-size:0.875rem; font-weight:500; color:#e8eaf0; }
    .info-val.disease { color:#c4b5fd; }

    .card-footer { margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.06); display:flex; justify-content:flex-end; }
    .btn-cancel {
      padding:8px 18px;
      background:rgba(239,68,68,0.1);
      border:1px solid rgba(239,68,68,0.25);
      border-radius:10px;
      color:#f87171; font-size:0.82rem; font-weight:600;
      cursor:pointer; font-family:inherit;
      transition:background 0.2s, transform 0.15s;
    }
    .btn-cancel:hover { background:rgba(239,68,68,0.2); transform:translateY(-1px); }

    .empty-state {
      text-align:center; padding:60px 20px;
      color:var(--muted);
    }
    .empty-state .icon {
      width:64px; height:64px; margin:0 auto 16px;
      background:rgba(255,255,255,0.04);
      border-radius:16px;
      display:flex; align-items:center; justify-content:center;
    }
    .empty-state svg { width:28px; height:28px; color:rgba(255,255,255,0.2); }
    .empty-state h3 { font-size:1.1rem; font-weight:600; color:rgba(255,255,255,0.5); margin-bottom:8px; }
    .empty-state p { font-size:0.875rem; }

    .loading-spinner {
      display:none; text-align:center; padding:40px;
      color:var(--muted); font-size:0.9rem;
    }

    .error-msg {
      display:none;
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25);
      border-radius:12px; padding:14px 18px;
      color:#fca5a5; font-size:0.875rem; margin-bottom:20px;
    }

    .toast {
      position:fixed; bottom:24px; right:24px;
      background:rgba(30,33,50,0.95);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px; padding:14px 20px;
      color:#fff; font-size:0.875rem; font-weight:500;
      z-index:1000;
      transform:translateY(80px); opacity:0;
      transition:transform 0.3s, opacity 0.3s;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { border-color:rgba(16,185,129,0.4); }
    .toast.error   { border-color:rgba(239,68,68,0.4); }

    @media(max-width:600px) {
      .topbar { padding:16px 20px; }
      .hero h1 { font-size:1.6rem; }
      .card-body { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a class="topbar-logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <span class="logo-text">Medora</span>
    </a>
    <div class="topbar-links">
      <a href="/predict">AI Prediction</a>
      <a href="/doctor/login">Doctor Portal</a>
    </div>
  </nav>

  <div class="hero">
    <h1>My Appointments</h1>
    <p>Enter your email address to view your bookings</p>
  </div>

  <div class="search-wrap">
    <input type="email" id="email-input" class="search-input" placeholder="your@email.com" autocomplete="email" />
    <button class="btn-search" onclick="loadBookings()">View Bookings</button>
  </div>

  <div class="content">
    <div class="error-msg" id="error-msg"></div>
    <div class="loading-spinner" id="loading">Loading your appointments…</div>
    <div id="bookings-area"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function toast(msg, type='success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      setTimeout(() => el.classList.remove('show'), 3200);
    }

    function formatDate(d) {
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
    }

    function fmt12(t) {
      const [h, m] = t.split(':');
      const hr = parseInt(h); const suffix = hr >= 12 ? 'PM' : 'AM';
      return `${hr > 12 ? hr-12 : hr || 12}:${m} ${suffix}`;
    }

    async function loadBookings() {
      const email = document.getElementById('email-input').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('error-msg').style.display='block';
        document.getElementById('error-msg').textContent='Please enter a valid email address.';
        return;
      }
      document.getElementById('error-msg').style.display='none';
      document.getElementById('loading').style.display='block';
      document.getElementById('bookings-area').innerHTML='';

      const res = await fetch('/api/appointments/by-email', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email})
      });
      const data = await res.json();
      document.getElementById('loading').style.display='none';

      if (!res.ok || data.error) {
        document.getElementById('error-msg').style.display='block';
        document.getElementById('error-msg').textContent=data.error || 'Failed to load bookings.';
        return;
      }

      const area = document.getElementById('bookings-area');

      if (!data.length) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
            <h3>No bookings found</h3>
            <p>No appointments found for <strong>${email}</strong>. Try predicting your disease to book one!</p>
          </div>`;
        return;
      }

      area.innerHTML = `<div class="section-title">Your Appointments <span class="count-badge">${data.length}</span></div>`;
      data.forEach(a => {
        const card = document.createElement('div');
        card.className = 'booking-card';
        card.id = `card-${a.id}`;
        card.innerHTML = `
          <div class="card-header">
            <div class="doctor-info">
              <h3>👨‍⚕️ ${a.doctor_name}</h3>
              <p>${a.specialty} · ${a.clinic} · ${a.city}</p>
            </div>
            <span class="badge badge-${a.status}" id="status-badge-${a.id}">${a.status}</span>
          </div>
          <div class="card-body">
            <div class="info-item">
              <span class="info-label">📅 Date</span>
              <span class="info-val">${formatDate(a.slot_date)}</span>
            </div>
            <div class="info-item">
              <span class="info-label">⏰ Time</span>
              <span class="info-val">${fmt12(a.start_time)} – ${fmt12(a.end_time)}</span>
            </div>
            <div class="info-item">
              <span class="info-label">🔬 Condition</span>
              <span class="info-val disease">${a.disease || '—'}</span>
            </div>
            <div class="info-item">
              <span class="info-label">📞 Doctor Contact</span>
              <span class="info-val">${a.contact}</span>
            </div>
            ${a.symptoms ? `<div class="info-item" style="grid-column:1/-1;">
              <span class="info-label">🩺 Symptoms</span>
              <span class="info-val">${a.symptoms}</span>
            </div>` : ''}
          </div>
          ${a.status === 'confirmed' ? `
          <div class="card-footer">
            <button class="btn-cancel" onclick="cancelBooking(${a.id}, this)">Cancel Appointment</button>
          </div>` : ''}
        `;
        area.appendChild(card);
      });
    }

    async function cancelBooking(id, btn) {
      if (!confirm('Cancel this appointment?')) return;
      const res = await fetch(`/api/appointments/cancel/${id}`, {method:'POST'});
      const data = await res.json();
      if (data.success) {
        document.getElementById(`status-badge-${id}`).className = 'badge badge-cancelled';
        document.getElementById(`status-badge-${id}`).textContent = 'cancelled';
        btn.closest('.card-footer').remove();
        toast('Appointment cancelled.');
      } else {
        toast(data.error || 'Failed to cancel', 'error');
      }
    }

    // Allow Enter key to search
    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadBookings();
    });
  </script>
</body>
</html>
